<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI → Adafruit → ESP32</title>

    <!-- TensorFlow -->
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>

    <!-- Teachable Machine -->
    <script defer src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        canvas {
            margin-top: 10px;
        }
    </style>
</head>


  <body>

<h2>Teachable Machine → Adafruit → ESP32</h2>

<button id="startBtn">Start Camera</button>

<p id="result">Waiting...</p>

    <script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/FX7M1MGaT/";

const USERNAME = "PhuNguyenLe";
const AIO_KEY  = "aio_JVwD80WfwzWBIRrbn96M6bJhgv6o";   // 🔴 BẮT BUỘC THAY
const FEED     = "led";

let model;
let webcam;

let lastSent = "";
let lastTime = 0;
document.getElementById("startBtn").onclick = () => {
    const wait = setInterval(() => {
        if (typeof tmImage !== "undefined") {
            clearInterval(wait);
            init();
        }
    }, 200);
};


    async function init() {
    try {
        model = await tmImage.load(
            MODEL_URL + "model.json",
            MODEL_URL + "metadata.json"
        );

        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();

        document.body.appendChild(webcam.canvas);

        loop();

    } catch (err) {
        console.error(err);
        alert("Lỗi: " + err.message);
    }
}

async function loop() {
    webcam.update();

    const predictions = await model.predict(webcam.canvas);

    const best = predictions.reduce((a, b) =>
        a.probability > b.probability ? a : b
    );

    document.getElementById("result").innerText =
        best.className + " (" + best.probability.toFixed(2) + ")";

    const now = Date.now();

    if (
        best.probability > 0.9 &&
        best.className !== lastSent &&
        now - lastTime > 2000
    ) {
        handleClass(best.className);

        lastSent = best.className;
        lastTime = now;
    }

    requestAnimationFrame(loop);
}


      function handleClass(name) {

    if (name === "Class 1") {
        send("1");   // bật
    }

    if (name === "Class 4") {
        send("0");   // tắt
    }
}


      function send(value) {

    fetch(`https://io.adafruit.com/api/v2/${USERNAME}/feeds/${FEED}/data`, {
        method: "POST",
        headers: {
            "X-AIO-Key": AIO_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ value: value })
    })
    .then(res => res.text())
    .then(data => console.log("Sent:", value, "|", data))
    .catch(err => console.error("Error:", err));
}


      
</script>
</body>
</html>
