<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI → Adafruit</title>

<style>
body { text-align:center; font-family:Arial; }
</style>
</head>

<body>

<h2>AI → Adafruit IO</h2>
<button id="startBtn">START</button>
<p id="kq">Ready</p>

<script>
// ✅ LOAD ĐÚNG FILE (UMD)
function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

async function loadLibs() {
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js");
    await loadScript("https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js");
    console.log("✅ libs OK");
}

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/FX7M1MGaT/";

const USERNAME = "PhuNguyenLe";
const AIO_KEY  = "aio_nLkZ95J9JvnLruYOgwzkYkuPTvRu";
const FEED     = "led";

let model, cam;
let last = "";
let t = 0;

document.getElementById("startBtn").onclick = async () => {

    try {
        document.getElementById("kq").innerText = "Loading libs...";
        await loadLibs();

        document.getElementById("kq").innerText = "Loading model...";

        model = await tmImage.load(
            MODEL_URL + "model.json",
            MODEL_URL + "metadata.json"
        );

        cam = new tmImage.Webcam(300,300,true);
        await cam.setup();
        await cam.play();

        document.body.appendChild(cam.canvas);

        document.getElementById("kq").innerText = "Running...";
        loop();

    } catch(e) {
        console.error(e);
        document.getElementById("kq").innerText = "❌ ERROR";
    }
};

async function loop() {

    cam.update();

    let p = await model.predict(cam.canvas);

    let best = p.reduce((a,b)=>
        a.probability>b.probability?a:b
    );

    document.getElementById("kq").innerText =
        best.className + " " + best.probability.toFixed(2);

    let now = Date.now();

    if(best.probability > 0.8 && now - t > 2000){

        if(best.className === "Class 1" && last !== "1"){
            send("1");
            last="1";
            t=now;
        }

        if(best.className === "Class 4" && last !== "0"){
            send("0");
            last="0";
            t=now;
        }
    }

    requestAnimationFrame(loop);
}

function send(v){

    fetch(`https://io.adafruit.com/api/v2/${USERNAME}/feeds/${FEED}/data`,{
        method:"POST",
        headers:{
            "X-AIO-Key":AIO_KEY,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({value:v})
    })
    .then(r=>{
        if(!r.ok) throw "ERR " + r.status;
        return r.text();
    })
    .then(()=>console.log("SEND",v))
    .catch(e=>console.error(e));
}
</script>

</body>
</html>
